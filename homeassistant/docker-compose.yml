services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    # High priority to prevent automation delays during heavy Immich processing
    cpu_shares: 1024
    
    # Required for Bluetooth and USB Zigbee/Z-Wave stick discovery
    privileged: true
    network_mode: host
    
    env_file:
      - ${PROJECT_DIR}/.env
      - .env

    environment:
      - TZ=${TZ:-UTC}
      - PUID=1000
      - PGID=1000

    volumes:
      - ${DATA_DIR}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /dev:/dev # Complete hardware access for sticks/sensors
      
    # Max Power: Ensure HASS starts after your system is fully ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s