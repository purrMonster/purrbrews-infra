services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    cpu_shares: 1024
    
    privileged: true
    network_mode: host
    
    env_file:
      - ${PROJECT_DIR}/.env
      - .env

    environment:
      - TZ=${TZ:-UTC}
      - PUID=1000
      - PGID=1000

    volumes:
      - ${DATA_DIR}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /dev:/dev 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - ${DATA_DIR}/whisper-data:/data
    command: --model base-int8 --language en

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - ${DATA_DIR}/piper-data:/data
    command: --voice ${PIPER_VOICE}