version: "3.9"

services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    env_file:
      - ../env
      - .env
    environment:
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_POSTGRES_PASSWORD=${AUTHELIA_STORAGE_POSTGRES_PASSWORD}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      # Maps to your global data directory structure
      - ${DATA_DIR}/authelia/config:/config
    ports:
      - "9091:9091"
    networks:
      - authelia_internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: authelia_redis
    restart: unless-stopped
    env_file:
      - ../env
      - .env
    environment:
      - REDIS_PASSWORD=${AUTHELIA_REDIS_PASSWORD}
    command: redis-server --requirepass ${AUTHELIA_REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR}/authelia/redis:/data
    networks:
      - authelia_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${AUTHELIA_REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: authelia_postgres
    restart: unless-stopped
    env_file:
      - ../env
      - .env
    environment:
      - POSTGRES_USER=${AUTHELIA_POSTGRES_USER:-authelia}
      - POSTGRES_PASSWORD=${AUTHELIA_STORAGE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTHELIA_POSTGRES_DB:-authelia}
    volumes:
      - ${DATA_DIR}/authelia/postgres:/var/lib/postgresql/data
    networks:
      - authelia_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHELIA_POSTGRES_USER:-authelia}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
  authelia_internal:
    internal: true
